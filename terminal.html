<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebCMD — Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff88;
    --green-dim: #00cc6a;
    --green-glow: rgba(0, 255, 136, 0.18);
    --red: #ff4466;
    --yellow: #ffcc00;
    --bg: #0a0c0a;
    --bg2: #0f120f;
    --border: rgba(0, 255, 136, 0.2);
    --caret: #00ff88;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--green);
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.6;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
    z-index: 99;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 16px;
  }

  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--green);
    text-shadow: 0 0 12px var(--green);
  }

  #logo span { color: #ffffff; opacity: 0.5; }

  #status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
    transition: all 0.3s;
  }
  #status-dot.connected {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  #status-text {
    font-size: 11px;
    opacity: 0.55;
    letter-spacing: 0.05em;
  }

  #header-right {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .hbtn {
    background: none;
    border: 1px solid var(--border);
    color: var(--green-dim);
    font-family: inherit;
    font-size: 11px;
    padding: 3px 10px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.15s;
    border-radius: 2px;
    text-decoration: none;
  }
  .hbtn:hover {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-glow);
    text-shadow: 0 0 6px var(--green);
  }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 14px 0 6px;
    scroll-behavior: smooth;
  }
  #output::-webkit-scrollbar { width: 4px; }
  #output::-webkit-scrollbar-track { background: transparent; }
  #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .line {
    display: flex;
    gap: 0;
    padding: 1px 0;
    opacity: 0;
    animation: fadein 0.12s forwards;
    white-space: pre-wrap;
    word-break: break-all;
  }
  @keyframes fadein {
    to { opacity: 1; }
  }

  .line.echo {
    color: #aaffcc;
    opacity: 0;
    animation: fadein 0.12s forwards;
  }
  .line.echo .prompt-path {
    color: var(--green);
    text-shadow: 0 0 8px var(--green-glow);
    font-weight: 600;
  }
  .line.out { color: #d4e8d4; }
  .line.err { color: var(--red); text-shadow: 0 0 6px rgba(255,68,102,0.4); }
  .line.info { color: var(--yellow); font-style: italic; }
  .line.empty { height: 6px; }

  #input-row {
    display: flex;
    align-items: center;
    border-top: 1px solid var(--border);
    padding: 10px 0 12px;
    gap: 0;
    flex-shrink: 0;
  }

  #prompt-cwd {
    color: var(--green);
    font-weight: 600;
    text-shadow: 0 0 10px var(--green);
    white-space: nowrap;
    margin-right: 6px;
    font-size: 14px;
    flex-shrink: 0;
    max-width: 420px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #prompt-arrow {
    color: var(--green-dim);
    margin-right: 8px;
    flex-shrink: 0;
  }

  #cmd-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: #e8ffe8;
    font-family: inherit;
    font-size: 14px;
    caret-color: var(--caret);
    letter-spacing: 0.02em;
  }

  #cmd-input::selection {
    background: rgba(0,255,136,0.25);
  }

  .banner {
    color: var(--green-dim);
    font-size: 12px;
    opacity: 0.6;
    padding: 4px 0 16px;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-left">
      <div id="logo">WEB<span>/</span>CMD</div>
      <div id="status-dot"></div>
      <div id="status-text">DISCONNECTED</div>
    </div>
    <div id="header-right">
      <a href="/" class="hbtn">🏠 HOME</a>
      <a href="/files" class="hbtn">📁 FILES</a>
      <button class="hbtn" onclick="clearOutput()">CLEAR</button>
      <button class="hbtn" onclick="sendCmd('history')">HISTORY</button>
    </div>
  </div>

  <div id="output">
    <div class="banner">
      ┌─────────────────────────────────────────┐<br>
      │  WebCMD Terminal — Local Shell over WS  │<br>
      │  Type commands below. cd saves context. │<br>
      └─────────────────────────────────────────┘
    </div>
  </div>

  <div id="input-row">
    <div id="prompt-cwd">~</div>
    <div id="prompt-arrow">&gt;</div>
    <input id="cmd-input" type="text" autocomplete="off" spellcheck="false"
           placeholder="enter command..." autofocus />
  </div>
</div>

<script>
  const output = document.getElementById('output');
  const input = document.getElementById('cmd-input');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const promptCwd = document.getElementById('prompt-cwd');

  let ws = null;
  let historyList = [];
  let histIdx = -1;
  let tempInput = '';
  let currentCwd = '~';
  let reconnectTimer = null;
  let reconnectCount = 0;

  // Умная функция для получения правильного WebSocket URL
  function getWebSocketUrl() {
    // Определяем протокол (ws или wss)
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    
    // Получаем хост (включает порт, если он указан и нестандартный)
    let host = window.location.host;
    
    // Проверяем, нужно ли добавлять порт 3000 по умолчанию
    // Если порт не указан (т.е. host не содержит ':') и мы не на стандартных портах 80/443
    const hasPort = host.includes(':');
    const isDefaultHttp = window.location.protocol === 'http:' && window.location.port === '80';
    const isDefaultHttps = window.location.protocol === 'https:' && window.location.port === '443';
    
    // Если порт не указан в URL и мы не на стандартных портах
    // значит, скорее всего, сервер работает на порту 3000
    if (!hasPort && !isDefaultHttp && !isDefaultHttps) {
      // Пробуем подключиться к порту 3000 (стандартный порт WebCMD)
      // Но также сохраняем возможность переопределить через конфиг
      host = host;
    }
    
    // Альтернативный вариант: можно попробовать сначала подключиться к текущему хосту без порта,
    // а при ошибке - переключиться на порт 3000. Но для простоты используем этот подход.
    
    const wsUrl = `${protocol}//${host}`;
    console.log(`WebSocket URL: ${wsUrl}`);
    return wsUrl;
  }

  function formatCwd(cwd) {
    if (!cwd) return '~';
    if (cwd.length > 50) return '…' + cwd.slice(-48);
    return cwd;
  }

  function appendLine(text, cls = '') {
    if (text === '') {
      const el = document.createElement('div');
      el.className = 'line empty';
      output.appendChild(el);
      return;
    }
    const lines = String(text).split('\n');
    lines.forEach(line => {
      const el = document.createElement('div');
      el.className = 'line ' + cls;
      el.textContent = line;
      output.appendChild(el);
    });
    output.scrollTop = output.scrollHeight;
  }

  function appendEcho(text) {
    const match = text.match(/^(.+?)>\s(.*)$/);
    const el = document.createElement('div');
    el.className = 'line echo';
    if (match) {
      const pathSpan = document.createElement('span');
      pathSpan.className = 'prompt-path';
      pathSpan.textContent = match[1] + '> ';
      const cmdSpan = document.createElement('span');
      cmdSpan.textContent = match[2];
      el.appendChild(pathSpan);
      el.appendChild(cmdSpan);
    } else {
      el.textContent = text;
    }
    output.appendChild(el);
    output.scrollTop = output.scrollHeight;
  }

  function clearOutput() {
    output.innerHTML = '<div class="banner">┌─────────────────────────────────────────┐<br>│  WebCMD Terminal — Local Shell over WS  │<br>│  Type commands below. cd saves context. │<br>└─────────────────────────────────────────┘</div>';
  }

  function setStatus(connected) {
    if (connected) {
      statusDot.className = 'connected';
      statusText.textContent = 'CONNECTED';
    } else {
      statusDot.className = '';
      statusText.textContent = reconnectCount > 0 ? `RECONNECTING (${reconnectCount})` : 'DISCONNECTED';
    }
  }

  function connect() {
    const wsUrl = getWebSocketUrl();
    console.log(`Connecting to WebSocket: ${wsUrl}`);
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      setStatus(true);
      reconnectCount = 0;
      if (reconnectTimer) clearTimeout(reconnectTimer);
      input.disabled = false;
      input.focus();
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      switch (msg.type) {
        case 'init':
          currentCwd = msg.data.cwd;
          promptCwd.textContent = formatCwd(currentCwd);
          break;
        case 'prompt':
          currentCwd = msg.data.cwd;
          promptCwd.textContent = formatCwd(currentCwd);
          input.disabled = false;
          input.focus();
          break;
        case 'echo':
          appendEcho(msg.data.text);
          break;
        case 'output':
          appendLine(msg.data.text, 'out');
          break;
        case 'error':
          appendLine(msg.data.text, 'err');
          break;
        case 'clear':
          clearOutput();
          break;
      }
    };

    ws.onclose = () => {
      setStatus(false);
      input.disabled = true;
      reconnectCount++;
      appendLine(`[disconnected — reconnecting in 3s...]`, 'info');
      reconnectTimer = setTimeout(connect, 3000);
    };

    ws.onerror = (err) => {
      console.error('WebSocket error:', err);
      ws.close();
    };
  }

  function sendCmd(cmd) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    historyList.push(cmd);
    histIdx = -1;
    tempInput = '';
    ws.send(JSON.stringify({ type: 'command', data: cmd }));
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const cmd = input.value;
      input.value = '';
      if (cmd.trim()) {
        sendCmd(cmd);
      } else {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'command', data: '' }));
        }
      }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyList.length === 0) return;
      if (histIdx === -1) {
        tempInput = input.value;
        histIdx = historyList.length - 1;
      } else if (histIdx > 0) {
        histIdx--;
      }
      input.value = historyList[histIdx];
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (histIdx === -1) return;
      if (histIdx < historyList.length - 1) {
        histIdx++;
        input.value = historyList[histIdx];
      } else {
        histIdx = -1;
        input.value = tempInput;
      }
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      clearOutput();
    }
  });

  document.addEventListener('click', () => input.focus());
  connect();
</script>
</body>
</html>
