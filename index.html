<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebCMD — System Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #00ff88;
    --green-dim: #00cc6a;
    --green-glow: rgba(0,255,136,0.15);
    --red: #ff4466;
    --yellow: #ffcc00;
    --blue: #44aaff;
    --bg: #0a0c0a;
    --bg2: #0f130f;
    --border: rgba(0,255,136,0.18);
  }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    min-height: 100vh;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 100;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
    padding: 30px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
  }

  .logo {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-shadow: 0 0 20px var(--green);
  }

  .logo span { color: #fff; opacity: 0.45; }

  .subtitle {
    color: var(--green-dim);
    font-size: 12px;
    margin-top: 8px;
    opacity: 0.7;
  }

  .action-buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 40px;
  }

  .btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--green-dim);
    font-family: inherit;
    font-size: 14px;
    padding: 12px 30px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-block;
    border-radius: 4px;
  }

  .btn:hover {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-glow);
    transform: translateY(-2px);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 20px;
    margin-bottom: 20px;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 20px;
    border-radius: 4px;
  }

  .card-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 15px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    color: var(--green);
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(0,255,136,0.1);
  }

  .info-label {
    color: var(--green-dim);
    font-size: 12px;
  }

  .info-value {
    font-weight: 600;
    word-break: break-word;
    text-align: right;
    font-size: 12px;
  }

  .memory-bar {
    background: rgba(0,255,136,0.1);
    height: 4px;
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }

  .memory-bar-fill {
    background: var(--green);
    height: 100%;
    transition: width 0.3s;
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--green-dim);
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%,100%{opacity:1} 50%{opacity:0.3}
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">WEB<span>/</span>CMD</div>
    <div class="subtitle">System Dashboard & Remote Control</div>
  </div>

  <div class="action-buttons">
    <a href="/terminal" class="btn">💻 TERMINAL</a>
    <a href="/files" class="btn">📁 FILE MANAGER</a>
  </div>

  <div id="system-info" class="grid">
    <div class="loading">Loading system information...</div>
  </div>
</div>

<script>
  async function loadSystemInfo() {
    try {
      const response = await fetch('/api/system');
      const info = await response.json();
      renderSystemInfo(info);
    } catch (error) {
      document.getElementById('system-info').innerHTML = `<div class="loading">Error loading system info: ${error.message}</div>`;
    }
  }

  function formatBytes(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
  }

  function formatUptime(seconds) {
    const days = Math.floor(seconds / 86400);
    const hours = Math.floor((seconds % 86400) / 3600);
    const minutes = Math.floor((seconds % 3600) / 60);
    const parts = [];
    if (days > 0) parts.push(days + 'd');
    if (hours > 0) parts.push(hours + 'h');
    if (minutes > 0) parts.push(minutes + 'm');
    return parts.join(' ') || '< 1m';
  }

function renderSystemInfo(info) {
  const grid = document.getElementById('system-info');
  grid.innerHTML = `
    <div class="card">
      <div class="card-title">🖥️ SYSTEM</div>
      <div class="info-row">
        <span class="info-label">OS</span>
        <span class="info-value">${info.osType} ${info.osRelease}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Architecture</span>
        <span class="info-value">${info.osArch}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Hostname</span>
        <span class="info-value">${info.hostname}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Username</span>
        <span class="info-value">${info.username}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Uptime</span>
        <span class="info-value">${formatUptime(info.uptime)}</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">💾 MEMORY</div>
      <div class="info-row">
        <span class="info-label">Total</span>
        <span class="info-value">${formatBytes(info.totalMemory)}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Used</span>
        <span class="info-value">${formatBytes(info.usedMemory)}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Free</span>
        <span class="info-value">${formatBytes(info.freeMemory)}</span>
      </div>
      <div class="memory-bar">
        <div class="memory-bar-fill" style="width: ${info.memoryUsagePercent}%"></div>
      </div>
      <div class="info-row" style="margin-top: 8px;">
        <span class="info-label">Usage</span>
        <span class="info-value">${info.memoryUsagePercent}%</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">⚡ CPU</div>
      <div class="info-row">
        <span class="info-label">Cores</span>
        <span class="info-value">${info.cpuCount}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Model</span>
        <span class="info-value">${info.cpus[0]?.model || 'Unknown'}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Speed</span>
        <span class="info-value">${info.cpus[0]?.speed || '?'} MHz</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🎮 GPU</div>
      <div class="info-row">
        <span class="info-label">Graphics</span>
        <span class="info-value">${info.gpu}</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🚀 NODE.JS</div>
      <div class="info-row">
        <span class="info-label">Version</span>
        <span class="info-value">${info.nodejs.version}</span>
      </div>
      <div class="info-row">
        <span class="info-label">V8</span>
        <span class="info-value">${info.nodejs.versions.v8}</span>
      </div>
      <div class="info-row">
        <span class="info-label">libuv</span>
        <span class="info-value">${info.nodejs.versions.uv}</span>
      </div>
      <div class="info-row">
        <span class="info-label">OpenSSL</span>
        <span class="info-value">${info.nodejs.versions.openssl}</span>
      </div>
    </div>
  `;
}


  loadSystemInfo();
  setInterval(loadSystemInfo, 35000);
</script>
</body>
</html>
